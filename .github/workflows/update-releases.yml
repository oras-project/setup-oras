name: Update releases.json

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional ORAS version to add (e.g. 1.3.2). Leave blank to auto-detect new releases.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update releases.json
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            node .github/scripts/update-releases.mjs "${{ inputs.version }}"
          else
            node .github/scripts/update-releases.mjs
          fi

      - name: Rebuild dist
        if: steps.update.outputs.ADDED_VERSIONS != ''
        run: npm run build

      - name: Create pull request
        if: steps.update.outputs.ADDED_VERSIONS != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/update-releases
          delete-branch: true
          commit-message: 'chore: update releases.json for ${{ steps.update.outputs.ADDED_VERSIONS }}'
          title: 'chore: update releases.json for ${{ steps.update.outputs.ADDED_VERSIONS }}'
          body: |
            Automated update for new ORAS release(s): `${{ steps.update.outputs.ADDED_VERSIONS }}`.

            Generated by `.github/workflows/update-releases.yml` using
            `.github/scripts/update-releases.mjs`. Please verify the appended
            entries in `src/lib/data/releases.json` and the rebuilt `dist/`
            before merging.

            Refs #168.
          signoff: true
